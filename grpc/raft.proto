syntax = "proto3";

package raft.v1;

option go_package = "raft/api/raft_v1";

message LogEntry {
  int32 term = 1;
  bytes command = 2;
}

service Raft {
  rpc RequestVote(RequestVoteArgs) returns (RequestVoteReply);
  rpc AppendEntries(AppendEntriesArgs) returns (AppendEntriesReply);
  rpc InstallSnapshot(InstallSnapshotArgs) returns (InstallSnapshotReply);
}

message RequestVoteArgs {
  int32 term = 1;
  int32 candidate_id = 2;
  int32 last_log_index = 3;
  int32 last_log_term = 4;
}

message RequestVoteReply {
  int32 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesArgs {
  int32 term = 1;
  int32 leader_id = 2;
  int32 prev_log_index = 3;
  int32 prev_log_term = 4;
  repeated LogEntry entries = 5;
  int32 leader_commit = 6;
}

message AppendEntriesReply {
  int32 term = 1;
  bool success = 2;
  int32 x_term = 3; // term of conflicting entry
  int32 x_index = 4; // index of first entry w/ XTerm
  int32 x_len = 5; // length of followers log
}

message InstallSnapshotArgs {
  int32 term = 1;
  int32 leader_id = 2;
  int32 last_included_index = 3;
  int32 last_included_term = 4;
  bytes data = 6;
  bool done = 7;
}

message InstallSnapshotReply {
  int32 term = 1;
}
